<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration – IUA Claim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--blue:#2196F3;--blue-dark:#1a2e4a;--blue-mid:#1565C0;--gray-bg:#f4f6fb;--text-dark:#1a2e4a;--text-muted:#7a8fa6;}
        body{font-family:'Nunito',sans-serif;height:100vh;display:flex;overflow:hidden;}
        .left-panel{width:50%;background:linear-gradient(145deg,#1a2e4a 0%,#0f1e35 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px;}
        .left-panel::after{content:'';position:absolute;bottom:-80px;right:-80px;width:320px;height:320px;background:rgba(33,150,243,0.08);border-radius:50%;}
        .left-panel::before{content:'';position:absolute;top:-60px;left:-60px;width:240px;height:240px;background:rgba(255,255,255,0.04);border-radius:50%;}
        .brand{color:white;font-size:2rem;font-weight:900;z-index:1;margin-bottom:12px;}
        .tagline{color:rgba(255,255,255,0.7);font-size:1rem;font-weight:600;text-align:center;z-index:1;margin-bottom:40px;}
        .shield-icon{z-index:1;font-size:6rem;color:rgba(33,150,243,0.6);animation:pulse 3s ease-in-out infinite;}
        @keyframes pulse{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.05);opacity:1;}}
        .right-panel{width:50%;background:var(--gray-bg);display:flex;align-items:center;justify-content:center;padding:60px;}
        .form-box{width:100%;max-width:400px;animation:slideUp .6s cubic-bezier(.16,1,.3,1);}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        .form-box h2{font-size:1.8rem;font-weight:900;color:var(--text-dark);margin-bottom:8px;text-align:center;}
        .form-box .sub{color:var(--text-muted);font-size:.9rem;font-weight:600;text-align:center;margin-bottom:32px;}
        .input-group{position:relative;margin-bottom:16px;}
        .input-group input{width:100%;padding:15px 20px 15px 50px;background:#eef1f7;border:2px solid transparent;border-radius:50px;font-size:.95rem;font-family:'Nunito',sans-serif;color:var(--text-dark);outline:none;transition:all .3s;}
        .input-group input::placeholder{color:var(--text-muted);font-weight:600;}
        .input-group input:focus{border-color:var(--blue);background:white;box-shadow:0 0 0 4px rgba(33,150,243,.12);}
        .input-group .icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:var(--text-muted);}
        .btn-connect{width:100%;padding:16px;background:var(--blue-dark);color:white;border:none;border-radius:50px;font-size:1rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .3s;margin-top:8px;box-shadow:0 8px 24px rgba(26,46,74,.25);}
        .btn-connect:hover{background:#0f1e35;transform:translateY(-2px);}
        .back-link{display:block;text-align:center;margin-top:20px;color:var(--text-muted);text-decoration:none;font-size:.85rem;font-weight:600;transition:.2s;}
        .back-link:hover{color:var(--blue);}
        .msg-error{background:#fff0f0;border:1.5px solid #f5b7b1;color:#c0392b;border-radius:12px;padding:12px 18px;font-size:.9rem;font-weight:600;margin-bottom:16px;display:none;text-align:center;}
        @media(max-width:768px){body{flex-direction:column;height:auto;}.left-panel,.right-panel{width:100%;}.left-panel{min-height:220px;}.right-panel{padding:40px 24px;}}
    </style>
</head>
<body>
    <div class="left-panel">
        <div class="brand">IUA Claim</div>
        <div class="tagline">Espace Administrateur</div>
        <i class="fa-solid fa-shield-halved shield-icon"></i>
    </div>
    <div class="right-panel">
        <div class="form-box">
            <h2>Accès Admin</h2>
            <p class="sub">Connectez-vous à votre espace de supervision</p>
            <div class="msg-error" id="msg"></div>
            <form id="adminLoginForm">
                <div class="input-group">
                    <i class="fa-solid fa-envelope icon"></i>
                    <input type="email" id="email" placeholder="Email administrateur" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" id="password" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn-connect">SE CONNECTER</button>
            </form>
            <a href="index-adpr.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Retour au site</a>
        </div>
    </div>
   
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.style.display='none';
            const res = await fetch('api/auth/login_admin.php', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
            });
            const result = await res.json();
            if (result.success) window.location.href = result.redirect;
            else { msg.style.display='block'; msg.textContent = result.message; }
        });
    </script>
</body>
</html>
