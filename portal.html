<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal – IUA Claim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--blue:#2196F3;--blue-dark:#1a2e4a;--gray-bg:#f4f6fb;--text-dark:#1a2e4a;--text-muted:#7a8fa6;}
        body{font-family:'Nunito',sans-serif;height:100vh;background:var(--gray-bg);display:flex;align-items:center;justify-content:center;}
        .portal-cards{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;padding:20px;}
        .portal-card{background:white;border-radius:24px;padding:44px 36px;width:210px;text-align:center;cursor:pointer;box-shadow:0 4px 24px rgba(26,46,74,.08);transition:all .35s cubic-bezier(.175,.885,.32,1.275);border:2px solid transparent;animation:fadeup .7s ease-out both;}
        .portal-card:nth-child(2){animation-delay:.1s;}
        @keyframes fadeup{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
        .portal-card:hover{transform:translateY(-14px);border-color:var(--blue);box-shadow:0 24px 48px rgba(33,150,243,.2);}
        .card-icon{width:70px;height:70px;border-radius:20px;background:rgba(33,150,243,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.8rem;color:var(--blue);transition:.3s;}
        .portal-card:hover .card-icon{background:var(--blue);color:white;}
        .portal-card p{font-weight:800;color:var(--text-dark);font-size:1rem;text-transform:uppercase;letter-spacing:.5px;}
    </style>
</head>
<body>
    <div class="portal-cards">
        <div class="portal-card" id="profCard">
            <div class="card-icon"><i class="fa-solid fa-chalkboard-user"></i></div>
            <p>Professeur</p>
        </div>
        <div class="portal-card" id="adminCard">
            <div class="card-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <p>Administrateur</p>
        </div>
    </div>
    <script>
        document.getElementById('profCard').addEventListener('click', () => setTimeout(() => window.location.href='login_prof.html', 300));
        document.getElementById('adminCard').addEventListener('click', () => setTimeout(() => window.location.href='login_admin.html', 300));
    </script>
</body>
</html>
